services:
  db:
    image: postgres:16-alpine
    container_name: subsolo-db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-subsolo}
    ports:
      - "5434:5432" # Expõe na 5434 para não conflitar com outros bancos locais
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-subsolo}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - subsolo-network

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    container_name: subsolo-backend-dev
    command: sh -c "cd backend && npx prisma db push && cd /app && npm run dev -w backend"
    ports:
      - "3001:3001"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules # Evita conflito entre node_modules do Windows e do Linux
      - /app/backend/node_modules
    depends_on:
      db:
        condition: service_healthy
    networks:
      - subsolo-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    container_name: subsolo-frontend-dev
    command: npm run dev -w frontend
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
      - /app/frontend/node_modules
    depends_on:
      backend:
        condition: service_started
    networks:
      - subsolo-network

networks:
  subsolo-network:
    driver: bridge

volumes:
  pgdata:
