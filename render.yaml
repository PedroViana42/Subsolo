services:
  - type: web
    name: subsolo-backend
    runtime: docker
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    envVars:
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false # Mantemos sigilo, o valor deve estar no Dashboard
      - key: JWT_SECRET
        sync: false # Mantemos sigilo, o valor deve estar no Dashboard
      - key: FRONTEND_URL
        sync: false # Mantemos sigilo, o valor deve estar no Dashboard
      - key: NODE_ENV
        value: production
    autoDeploy: true
